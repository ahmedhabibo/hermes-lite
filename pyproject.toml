[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "hermes-lite"
version = "0.3.0"
description = "Hermes-Lite — run a full AI agent on any laptop. Local 7B model, 6 tools, routing, memory, observability."
requires-python = ">=3.9"
dependencies = [
    "pydantic>=2.0",
    "aiosqlite>=0.20.0",
    "prompt-toolkit>=3.0.0",
    "rich>=13.0.0",
    "openai>=1.40.0",
]

[tool.setuptools.packages.find]
include = ["hermes_lite*"]

[project.optional-dependencies]
test = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
markers = [
    "slow: marks tests that may exceed a few seconds (deselected with '-m \"not slow\"')",
]

[tool.coverage.run]
source = ["hermes_lite"]